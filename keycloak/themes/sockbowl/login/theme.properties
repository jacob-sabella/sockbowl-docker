# Sockbowl login theme.
#
# Extends Keycloak's stock "keycloak" login theme and layers a single Sockbowl
# stylesheet on top of it. We deliberately override NO FreeMarker templates:
# the brand (canvas, card, inputs, button, wordmark + mark + tagline) is applied
# purely through CSS against the base theme's existing DOM. That keeps the login
# FLOW identical to upstream and survives Keycloak upgrades — the worst a class
# rename can do is fall back to the base look, never break sign-in.
#
# The wordmark text ("Sockbowl") comes from the realm's displayNameHtml, which
# the base template renders into #kc-header-wrapper; sockbowl.css styles that
# text and hangs the mark + tagline off it as pseudo-elements.
parent=keycloak
import=common/keycloak

# `styles` fully replaces the parent's list, so we re-list the base login.css
# (resolved up the parent chain) and append ours after it — the documented way
# to extend rather than replace. sockbowl.css is a self-sufficient override
# layer, so the look holds even if a base sheet ever stops resolving.
styles=css/login.css css/sockbowl.css
