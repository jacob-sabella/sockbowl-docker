services:
  kafka:
    image: apache/kafka:4.0.2
    container_name: kafka
    network_mode: "host"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      # 7 days: game-session messages must survive consumer lag / replay.
      # The prior 1h value silently dropped messages on any slowdown.
      - KAFKA_LOG_RETENTION_HOURS=168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  postgres:
    # NOTE: Postgres 17 cannot read a PG13 data dir. On upgrade from an older
    # stack, remove the old volume first: `docker compose down && docker volume rm sockbowl-docker_postgres_data`
    image: postgres:17
    container_name: postgres
    network_mode: "host"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=sockbowl
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-sockbowl}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  keycloak-realm-init:
    image: alpine:3.21
    container_name: keycloak-realm-init
    network_mode: "host"
    environment:
      - APP_HOST=${APP_HOST}
      - APP_PROTOCOL=${APP_PROTOCOL}
      - SOCKBOWL_GAME_PORT=${SOCKBOWL_GAME_PORT}
      - KEYCLOAK_USER_USERNAME=${KEYCLOAK_USER_USERNAME}
      - KEYCLOAK_USER_EMAIL=${KEYCLOAK_USER_EMAIL}
      - KEYCLOAK_USER_FIRSTNAME=${KEYCLOAK_USER_FIRSTNAME}
      - KEYCLOAK_USER_LASTNAME=${KEYCLOAK_USER_LASTNAME}
      - KEYCLOAK_USER_PASSWORD=${KEYCLOAK_USER_PASSWORD}
      - CREATE_DEMO_ACCOUNTS=${CREATE_DEMO_ACCOUNTS}
    volumes:
      - ./scripts/init-keycloak-realm.sh:/init-keycloak-realm.sh
      - ./keycloak/realm-export.template.json:/tmp/realm-export.template.json
      - keycloak_import:/opt/keycloak/data/import
    entrypoint: ["/bin/sh", "/init-keycloak-realm.sh"]
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: keycloak
    network_mode: "host"
    environment:
      # KC 26 renamed the bootstrap admin vars; keep legacy ones for back-compat.
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://${APP_HOST}:${POSTGRES_PORT}/keycloak
      - KC_DB_USERNAME=${POSTGRES_USER}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD}
      - KC_HOSTNAME=${APP_HOST}
      - KC_HTTP_PORT=${KEYCLOAK_PORT}
      - KC_HEALTH_ENABLED=true
    command: start-dev --import-realm
    volumes:
      - keycloak_import:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-realm-init:
        condition: service_completed_successfully

  neo4j-plugin-init:
    image: curlimages/curl:8.21.0
    container_name: neo4j-plugin-init
    network_mode: "host"
    user: "root"
    volumes:
      - ./scripts/download-neo4j-plugins.sh:/plugin.sh
      - neo4j_plugins:/plugins
    entrypoint: ["/plugin.sh"]
    restart: "no"

  redis:
    # redis-stack-server bundles RediSearch + RedisJSON (required by Redis OM Spring 2.x)
    # and auto-loads them, so no manual --loadmodule flags are needed.
    image: redis/redis-stack-server:7.4.0-v8
    container_name: redis
    network_mode: "host"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  neo4j:
    image: neo4j:5.26
    container_name: neo4j
    network_mode: "host"
    depends_on:
      neo4j-plugin-init:
        condition: service_completed_successfully
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
      - neo4j_plugins:/plugins
    command: ["neo4j"]
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:${NEO4J_PORT:-7687} -u ${NEO4J_USER} -p ${NEO4J_PASSWORD} 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 30s

  neo4j-data-import:
    image: neo4j:5.26
    container_name: neo4j-data-import
    network_mode: "host"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_HOST=${APP_HOST}
      - NEO4J_PORT=${NEO4J_PORT}
    volumes:
      - ./scripts/init-neo4j.sh:/init.sh
    entrypoint: ["/init.sh"]
    restart: "no"

  sockbowl-game:
    image: ghcr.io/jacob-sabella/sockbowl-game:main
    container_name: sockbowl-game
    # App services are gated behind the "full" profile so a bare `docker compose up`
    # starts infra only (run game/questions/ng from source for local dev).
    profiles: ["full"]
    network_mode: "host"
    environment:
      SOCKBOWL_DATABASE: 0
      SOCKBOWL_KAFKA_BOOTSTRAP_SERVERS: "${APP_HOST}:${KAFKA_PORT}"
      SOCKBOWL_KAFKA_GAME_TOPIC: "${SOCKBOWL_KAFKA_GAME_TOPIC}"
      SOCKBOWL_PORT: "${SOCKBOWL_GAME_PORT}"
      SOCKBOWL_REDIS_HOST: "${APP_HOST}"
      SOCKBOWL_REDIS_PORT: "${REDIS_PORT}"
      SOCKBOWL_DB_URL: "jdbc:postgresql://${APP_HOST}:${POSTGRES_PORT}/sockbowl_users"
      SOCKBOWL_DB_USERNAME: "${POSTGRES_USER}"
      SOCKBOWL_DB_PASSWORD: "${POSTGRES_PASSWORD}"
      SOCKBOWL_QUESTIONS_URL: "${APP_PROTOCOL}://${APP_HOST}:${SOCKBOWL_QUESTIONS_PORT}/"
      SOCKBOWL_GAME_ALLOWED_ORIGINS: "${SOCKBOWL_GAME_ALLOWED_ORIGINS}"
      KEYCLOAK_CLIENT_SECRET: "${KEYCLOAK_CLIENT_SECRET}"
      SOCKBOWL_AUTH_ENABLED: "${AUTH_ENABLED:-false}"
      KEYCLOAK_ISSUER_URI: "${KEYCLOAK_ISSUER_URI}"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      sockbowl-questions:
        condition: service_started
      keycloak:
        condition: service_started

  sockbowl-questions:
    image: ghcr.io/jacob-sabella/sockbowl-questions:main
    container_name: sockbowl-questions
    profiles: ["full"]
    network_mode: "host"
    environment:
      SOCKBOWL_NEO4J_USER: "${NEO4J_USER}"
      SOCKBOWL_NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      SOCKBOWL_NEO4J_URL: "bolt://${APP_HOST}:${NEO4J_PORT}"
      SOCKBOWL_PORT: "${SOCKBOWL_QUESTIONS_PORT}"
      SOCKBOWL_AI_PROVIDER: "${SOCKBOWL_AI_PROVIDER}"
      SOCKBOWL_AI_LOCAL_MODEL: "${SOCKBOWL_AI_LOCAL_MODEL}"
      SPRING_AI_OPENAI_CHAT_ENABLED: "${SPRING_AI_OPENAI_CHAT_ENABLED}"
      SPRING_AI_OLLAMA_CHAT_ENABLED: "${SPRING_AI_OLLAMA_CHAT_ENABLED}"
      SPRING_AI_OLLAMA_BASE_URL: "${SPRING_AI_OLLAMA_BASE_URL}"
      SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL: "${SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      SOCKBOWL_ALLOWED_ORIGINS: "${SOCKBOWL_QUESTIONS_ALLOWED_ORIGINS}"
    depends_on:
      neo4j:
        condition: service_healthy
      neo4j-data-import:
        condition: service_completed_successfully

  sockbowl-ng:
    image: ghcr.io/jacob-sabella/sockbowl-ng:main
    container_name: sockbowl-ng
    profiles: ["full"]
    network_mode: "host"
    environment:
      - APP_HOST=${APP_HOST}
      - APP_PROTOCOL=${APP_PROTOCOL}
      - WS_PROTOCOL=${WS_PROTOCOL}
      - SOCKBOWL_GAME_PORT=${SOCKBOWL_GAME_PORT}
      - SOCKBOWL_QUESTIONS_PORT=${SOCKBOWL_QUESTIONS_PORT}
      - KEYCLOAK_PORT=${KEYCLOAK_PORT}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    profiles: ["full"]
    volumes:
      - ${XDG_RUNTIME_DIR}/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=30
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_DEBUG=true
      - DOCKER_API_VERSION=1.44
    command: sockbowl-game sockbowl-questions sockbowl-ng
    restart: unless-stopped

volumes:
  kafka_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_plugins:
    driver: local
  keycloak_import:
    driver: local
